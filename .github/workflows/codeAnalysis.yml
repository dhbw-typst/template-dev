name: Code Analysis
on:
  pull_request:
  workflow_dispatch:
jobs:
  discover_files:
    name: Discover main-*.typ files
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.find_files.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Find main-*.typ files
        id: find_files
        run: |
          FILES=$({
            ls template/main-*.typ 2>/dev/null | while read f; do
              basename="${f##*/}"
              name="${basename%.typ}"
              echo "{\"file\":\"$name\",\"path\":\"$f\"}"
            done
            echo '{"file":"documentation","path":"documentation.typ"}'
          } | jq -s -c '.')
          echo "matrix=${FILES}" >> "$GITHUB_OUTPUT"

  check_formatting:
    name: Check Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install typstyle
        run: |
          curl -L https://github.com/typstyle-rs/typstyle/releases/download/v0.14.4/typstyle-x86_64-unknown-linux-gnu -o typstyle
          chmod +x typstyle
      - name: Typstyle version
        run: ./typstyle --version
      - name: Run formatting check
        run: |
          ./typstyle ./template --check

  check_build:
    name: Check Build
    needs: discover_files
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover_files.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          mkdir -p typst_bin
          tar -xf typst.tar.xz -C typst_bin
          mv typst_bin/typst-x86_64-unknown-linux-musl/typst typst
          chmod +x typst
      - name: Typst version
        run: ./typst --version
      - name: Build template
        run: ./typst compile ${{ matrix.path }}

  check_build_results:
    name: Check Build Result
    needs: check_build
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any build failed
        if: needs.check_build.result != 'success'
        run: exit 1

  check_pdf:
    name: Check PDF parity (${{ matrix.file }})
    needs: discover_files
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover_files.outputs.matrix) }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: new
      - name: Install typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          mkdir -p typst_bin
          tar -xf typst.tar.xz -C typst_bin
          mv typst_bin/typst-x86_64-unknown-linux-musl/typst typst
          chmod +x typst
      - name: Typst version
        run: ./typst --version
      - name: Build PDF on PR branch
        run: |
          ./typst compile new/${{ matrix.path }} new.pdf
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.base_ref || 'main' }}
          path: old
      - name: Build PDF on main branch
        run: |
          ./typst compile old/${{ matrix.path }} old.pdf
      - name: Compare PDFs
        id: diff_check
        uses: nowsprinting/diff-pdf-action@21193e71055e9cd98ae8704bf95590e50fb0d3c3 # v1.2.3
        continue-on-error: true
        with:
          file1: old.pdf
          file2: new.pdf
          options: --skip-identical --mark-differences --output-diff=diff-${{ matrix.file }}.pdf
          suppress-diff-error: false
      - name: Upload diff.pdf artifact
        if: steps.diff_check.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diff-pdf-${{ matrix.file }}
          path: diff-${{ matrix.file }}.pdf
          archive: false

  comment_pdf_diff:
    name: Comment PDF diff results
    runs-on: ubuntu-24.04
    needs: check_pdf
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download diff PDFs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          pattern: diff-pdf-*
          path: diffs
      - name: Build comment body
        id: build_comment
        run: |
          HAS_DIFF=false
          BODY="> [!NOTE]"
          BODY="${BODY}\n> **PDF Differences Detected**"
          BODY="${BODY}\n>"
          BODY="${BODY}\n> The following PDF outputs have changed between the base branch and this PR:"
          BODY="${BODY}\n>"

          for diff in diffs/diff-pdf-*; do
            if [[ -f "$diff" ]]; then
              file_name=$(basename "$diff" | sed 's/^diff-pdf-//')
              echo "Found diff for ${file_name}"
              BODY="${BODY}\n> - \`${file_name}\` — download [\`diff-pdf-${file_name}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              HAS_DIFF=true
            fi
          done

          echo "has_diff=${HAS_DIFF}" >> "$GITHUB_OUTPUT"

          # Write multiline body to file for the comment action
          echo -e "$BODY" > comment-body.md
      - name: Create or update sticky comment
        if: steps.build_comment.outputs.has_diff == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: pdf-diff
          path: comment-body.md
      - name: Delete sticky comment if no diffs
        if: steps.build_comment.outputs.has_diff == 'false'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: pdf-diff
          delete: true
