name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  synchronize:
    name: Synchronize files in `template/`
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout `template-dev`
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: template-dev
          repository: dhbw-typst/oderso-template-dev
          # ensure that we checkout the `main` branch on `template-dev`
          # this is VERY important when testing changes to this action via a PR
          # branch on the `oderso-template-dev` repository
          # if this is not specified, the checkout action will check out the PR
          # branch and will sync that to the specified (test) repository
          ref: main
      - name: Check for changes in template
        id: check_changes
        working-directory: template-dev
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^template/'; then
            echo "template_changed=true" >> $GITHUB_OUTPUT
          else
            echo "template_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Stop if nothing changed in template
        if: steps.check_changes.outputs.template_changed == 'false'
        run: |
          echo "No changes in template detected. Skipping sync and release."
      - name: Checkout `template`
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check_changes.outputs.template_changed == 'true'
        with:
          fetch-depth: 0
          path: template
          repository: dhbw-typst/oderso-template
          token: ${{ secrets.BOT_PAT }}
      - name: Install `git-filter-repo`
        if: steps.check_changes.outputs.template_changed == 'true'
        working-directory: /tmp
        run: |
          curl -L https://github.com/newren/git-filter-repo/releases/download/v2.47.0/git-filter-repo-2.47.0.tar.xz -o git-filter-repo.tar.xz
          tar -xvf git-filter-repo.tar.xz

          /tmp/git-filter-repo*/git-filter-repo --version
      - name: Set git user
        if: steps.check_changes.outputs.template_changed == 'true'
        run: |
          git config --global user.name "dhbw-typst-automation[bot]"
          git config --global user.email "dhbw-typst-automation[bot] <279977597+dhbw-typst-automation@users.noreply.github.com>"
      - name: Synchronize template files
        if: steps.check_changes.outputs.template_changed == 'true'
        run: /tmp/git-filter-repo*/git-filter-repo --source ./template-dev --target ./template --subdirectory-filter template/
      - name: Push changes
        if: steps.check_changes.outputs.template_changed == 'true'
        working-directory: template
        run: |
          git push --force
  release:
    name: Create Release in Dev and Prod
    needs: synchronize
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
      - name: Get next version
        uses: thenativeweb/get-next-version@067dc4602577f4f61a51c3f4664552283a228c60
        id: version
        with:
          prefix: "v"
      - name: Install typst
        if: steps.version.outputs.hasNextVersion == 'true'
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          mkdir -p typst_bin
          tar -xf typst.tar.xz -C typst_bin
          mv typst_bin/typst-x86_64-unknown-linux-musl/typst typst
          chmod +x typst
      - name: Build template
        run: |
          for file in $(ls template/main-*.typ); do
            ./typst compile $file
          done
      - name: Release dev repo
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: template/main-*.pdf
          tag_name: ${{ steps.version.outputs.version }}
      - name: Release prod repo
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.BOT_PAT }}
          files: template/main-*.pdf
          tag_name: ${{ steps.version.outputs.version }}
          repository: dhbw-typst/oderso-template
